listen=udp:172.20.0.3:5060
listen=tcp:172.20.0.3:5060
listen=tcp:172.20.0.3:8080

children=2
log_stderror=yes
log_facility=LOG_LOCAL0
debug=2
dns=no
rev_dns=no
tcp_accept_no_cl=yes

mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "xhttp.so"
loadmodule "nathelper.so"
loadmodule "websocket.so"
loadmodule "path.so"

modparam("sl", "bind_tm", 1)
modparam("tm", "fr_timer", 5)
modparam("tm", "fr_inv_timer", 60)
modparam("rr", "enable_full_lr", 1)
modparam("websocket", "keepalive_mechanism", 0)
modparam("nathelper", "natping_interval", 0)

request_route {

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (is_method("REGISTER")) {
        add_path();
        if (!t_relay_to_udp("172.20.0.2", "5060")) {
            sl_reply_error();
        }
        exit;
    }
    if (src_ip == 172.20.0.2) {
        if (!t_relay()) {
            sl_reply_error();
        }
        exit;
    }

    record_route();
    if (!t_relay_to_udp("172.20.0.2", "5060")) {
        sl_reply_error();
    }
    exit;
}

event_route[xhttp:request] {
    if (ws_handle_handshake()) {
        exit;
    }
    xhttp_reply("404", "Not Found", "text/plain", "Not Found");
}
