version: "3.8"

networks:
  sip-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:

  asterisk:
    build:
      context: ./asterisk
    container_name: asterisk
    hostname: asterisk
    networks:
      sip-net:
        ipv4_address: 172.20.0.2
    ports:
      - "8089:8089"
      - "10000-10100:10000-10100/udp"
      - "8088:8088"
    restart: unless-stopped

  kamailio:
    image: ghcr.io/kamailio/kamailio:5.8.7-bookworm   
    platform: linux/amd64
    container_name: kamailio
    hostname: kamailio
    networks:
      sip-net:
        ipv4_address: 172.20.0.3
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "8080:8080/tcp"
    volumes:
      - ./kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
    restart: unless-stopped
    depends_on:
      - asterisk
    command: kamailio -DD -E -e