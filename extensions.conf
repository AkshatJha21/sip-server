[internal]
; When 1001 is dialed, ring extension 1001
exten => 1001,1,Dial(PJSIP/1001,30)
exten => 1001,n,Hangup()

; When 1002 is dialed, ring extension 1002
exten => 1002,1,Dial(PJSIP/1002,30)
exten => 1002,n,Hangup()

; Echo test - dial 9999 to test audio
exten => 9999,1,Answer()
exten => 9999,n,Echo()
exten => 9999,n,Hangup()

exten => _10XX,1,NoOp(Dialing ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()