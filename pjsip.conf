; === GLOBAL ===
[global]
type=global
user_agent=MyPBX

; === SYSTEM ===
[system]
type=system
domain=asterisk.local

; === TRANSPORTS ===
[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
local_net=172.17.0.0/16
external_media_address=127.0.0.1
external_signaling_address=127.0.0.1

; === EXTENSION 1001 ===
[1001]
type=endpoint
context=internal
disallow=all
allow=opus
allow=ulaw
transport=transport-wss
webrtc=yes
aors=1001
auth=1001-auth

[1001-auth]
type=auth
auth_type=userpass
username=1001
password=secret1001

; === EXTENSION 1002 ===
[1002]
type=endpoint
context=internal
disallow=all
allow=opus
allow=ulaw
transport=transport-wss
webrtc=yes
aors=1002
auth=1002-auth

[1002-auth]
type=auth
auth_type=userpass
username=1002
password=secret1002

#include pjsip_aor.conf